<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page - Iron House Gym</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1f2937 0%, #000000 100%);
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #ef4444;
            font-size: 3em;
            margin-bottom: 20px;
        }
        .status {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .success {
            border: 2px solid #10b981;
            color: #10b981;
        }
        .btn {
            background: #ef4444;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ IRON HOUSE GYM</h1>
        <div class="status success">
            <h2>✅ Server is Running!</h2>
            <p>If you can see this page, the web server is working correctly.</p>
        </div>
        
        <div>
            <h3>Next Steps:</h3>
            <p>The React app should be available at the same URL.</p>
            <p>If you're still seeing issues, there might be JavaScript errors.</p>
        </div>
        
        <div>
            <a href="http://localhost:5173" class="btn">Try React App</a>
            <a href="#" onclick="window.location.reload()" class="btn">Refresh Page</a>
        </div>
        
        <div style="margin-top: 30px; font-size: 14px; opacity: 0.7;">
            <p>Current URL: <span id="url"></span></p>
            <p>Time: <span id="time"></span></p>
        </div>
    </div>

    <script>
        document.getElementById('url').textContent = window.location.href;
        document.getElementById('time').textContent = new Date().toLocaleString();
        
        // Test if React app is loading
        fetch('/src/App.jsx')
            .then(response => {
                console.log('React app files accessible:', response.ok);
            })
            .catch(error => {
                console.log('Error accessing React files:', error);
            });
    </script>
</body>
</html>
